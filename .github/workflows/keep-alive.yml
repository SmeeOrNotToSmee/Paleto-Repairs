name: Keep Supabase Project Awake

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch: {}

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -s -o /dev/null -w "Supabase responded with HTTP %{http_code}\n" \
            "https://gpaqlehknskrcthyaapo.supabase.co/rest/v1/Paleto?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
